name: Pro Stock News Alert

on:
  schedule:
    - cron: '*/10 * * * *' # เช็คข่าวทุก 10 นาที
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pytz

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python us_stock_alert_pro.py

      - name: Commit files
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase origin main || true
          git add sent_news.json daily_summary.json
          git diff --staged --quiet || git commit -m "Update news data"
          git push || echo "Push skipped due to conflict"
        continue-on-error: true
